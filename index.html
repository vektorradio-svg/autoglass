<title>AutoGlass Pro</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0B0E1A;--sf:#141828;--s2:#1C2235;
  --bd:rgba(255,255,255,0.07);
  --blue:#3D8EF0;--green:#3DD68C;--yel:#F0B429;--red:#F05252;
  --tx:#E8EDF8;--sub:#5A6480;
}
body{background:var(--bg);font-family:'Nunito',sans-serif;color:var(--tx);min-height:100vh;}
.hidden{display:none!important;}
/* LOGIN */
#ls{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.li{width:72px;height:72px;background:linear-gradient(135deg,#3D8EF0,#2060C0);border-radius:22px;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 12px;box-shadow:0 12px 32px rgba(61,142,240,0.35);}
.lb{font-size:24px;font-weight:900;text-align:center;margin-bottom:4px;}
.lb span{color:var(--blue);}
.lt{font-size:11px;color:var(--sub);letter-spacing:3px;text-transform:uppercase;text-align:center;margin-bottom:32px;}
.lc{background:var(--sf);border:1px solid var(--bd);border-radius:24px;padding:28px 24px;width:100%;max-width:360px;}
.lbl{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--sub);margin-bottom:8px;display:block;}
.inp{width:100%;background:var(--s2);border:1.5px solid var(--bd);border-radius:12px;padding:13px 16px;color:var(--tx);font-family:'Nunito',sans-serif;font-size:15px;outline:none;margin-bottom:16px;}
.inp:focus{border-color:var(--blue);}
.lbtn{width:100%;padding:15px;background:linear-gradient(135deg,#3D8EF0,#2060C0);border:none;border-radius:14px;color:#fff;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 8px 24px rgba(61,142,240,0.4);}
.err{color:var(--red);font-size:13px;text-align:center;margin-top:10px;font-weight:700;}
.hint{background:rgba(61,142,240,0.07);border:1px solid rgba(61,142,240,0.15);border-radius:12px;padding:12px 16px;margin-top:16px;width:100%;max-width:360px;}
.hr{font-size:12px;color:var(--sub);margin-bottom:3px;font-weight:600;}
/* APP */
#as{display:none;flex-direction:column;min-height:100vh;}
.hdr{padding:48px 20px 16px;display:flex;justify-content:space-between;align-items:center;}
.hg{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--sub);}
.ht{font-size:24px;font-weight:900;}
.logbtn{background:none;border:none;cursor:pointer;color:var(--sub);font-size:20px;padding:8px;}
/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(20,24,40,0.97);border-top:1px solid var(--bd);backdrop-filter:blur(20px);padding:8px 0 20px;display:flex;justify-content:space-around;z-index:100;}
.nb{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 8px;background:none;border:none;color:var(--sub);font-family:'Nunito',sans-serif;font-size:10px;font-weight:700;position:relative;min-width:55px;}
.nb.active{color:var(--blue);}
.ni{font-size:20px;}
.ndot{position:absolute;top:0;right:6px;width:8px;height:8px;background:var(--red);border-radius:50%;border:2px solid var(--bg);}
/* CONTENT */
#content{flex:1;padding-bottom:80px;overflow-y:auto;}
/* CARDS */
.card{background:var(--sf);border:1px solid var(--bd);border-radius:20px;padding:18px;margin:0 16px 12px;}
.ct{font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--sub);margin-bottom:14px;}
/* STATS */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px;margin-bottom:12px;}
.sc{background:var(--sf);border:1px solid var(--bd);border-radius:18px;padding:16px;}
.sc.full{grid-column:span 2;}
.sl{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--sub);margin-bottom:6px;}
.sv{font-size:26px;font-weight:900;}
.sn{font-size:11px;color:var(--sub);margin-top:3px;font-weight:600;}
/* ALERTS */
.al{border-radius:14px;padding:12px 14px;margin:0 16px 10px;font-size:13px;font-weight:600;cursor:pointer;}
.al-r{background:rgba(240,82,82,0.1);border:1px solid rgba(240,82,82,0.2);color:var(--red);}
.al-y{background:rgba(240,180,41,0.1);border:1px solid rgba(240,180,41,0.2);color:var(--yel);}
.al-g{background:rgba(61,214,140,0.1);border:1px solid rgba(61,214,140,0.2);color:var(--green);}
/* ROWS */
.ir{display:flex;align-items:center;padding:11px 0;border-bottom:1px solid var(--bd);}
.ir:last-child{border-bottom:none;}
.ii{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-right:12px;font-size:16px;}
.ib{flex:1;min-width:0;}
.in{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.is{font-size:11px;color:var(--sub);margin-top:2px;font-weight:600;}
.iright{text-align:right;flex-shrink:0;margin-left:8px;}
.ip{font-size:14px;font-weight:900;color:var(--green);}
/* BADGES */
.b{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:800;}
.bok{background:rgba(61,214,140,0.12);color:var(--green);border:1px solid rgba(61,214,140,0.25);}
.bwarn{background:rgba(240,180,41,0.12);color:var(--yel);border:1px solid rgba(240,180,41,0.25);}
.blow{background:rgba(240,82,82,0.12);color:var(--red);border:1px solid rgba(240,82,82,0.25);}
.bblue{background:rgba(61,142,240,0.12);color:var(--blue);border:1px solid rgba(61,142,240,0.25);}
/* SEARCH */
.sw{padding:0 16px;margin-bottom:10px;}
.si{width:100%;background:var(--sf);border:1.5px solid var(--bd);border-radius:14px;padding:11px 16px;color:var(--tx);font-family:'Nunito',sans-serif;font-size:14px;outline:none;}
.si:focus{border-color:var(--blue);}
/* FILTERS */
.fr{display:flex;gap:8px;padding:0 16px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none;}
.fr::-webkit-scrollbar{display:none;}
.chip{flex-shrink:0;padding:7px 14px;border-radius:20px;border:1.5px solid var(--bd);background:transparent;color:var(--sub);font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;}
.chip.active{background:rgba(61,142,240,0.12);border-color:var(--blue);color:var(--blue);}
/* SECTION */
.sh{padding:6px 16px;font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#3A4060;}
/* BUTTONS */
.btn{padding:11px 20px;border-radius:12px;border:none;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;}
.bp{background:linear-gradient(135deg,#3D8EF0,#2060C0);color:#fff;box-shadow:0 4px 16px rgba(61,142,240,0.35);}
.bs{background:rgba(61,214,140,0.12);color:var(--green);border:1px solid rgba(61,214,140,0.25);}
.bd2{background:rgba(240,82,82,0.1);color:var(--red);border:1px solid rgba(240,82,82,0.2);}
.bf{width:100%;padding:15px;}
/* FAB */
.fab{position:fixed;bottom:88px;right:20px;width:56px;height:56px;background:linear-gradient(135deg,#3D8EF0,#2060C0);border:none;border-radius:18px;font-size:26px;color:#fff;cursor:pointer;box-shadow:0 8px 24px rgba(61,142,240,0.5);z-index:90;display:flex;align-items:center;justify-content:center;}
/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:none;align-items:flex-end;backdrop-filter:blur(4px);}
.ov.open{display:flex;}
.ms{width:100%;background:var(--sf);border-radius:24px 24px 0 0;padding:24px 20px 44px;border-top:1px solid var(--bd);max-height:88vh;overflow-y:auto;}
.mh{width:40px;height:4px;background:#3A4060;border-radius:2px;margin:0 auto 20px;}
.mt{font-size:18px;font-weight:900;margin-bottom:20px;}
.fg{margin-bottom:14px;}
.fsel{width:100%;background:var(--s2);border:1.5px solid var(--bd);border-radius:12px;padding:12px 14px;color:var(--tx);font-family:'Nunito',sans-serif;font-size:14px;outline:none;}
/* STEPPER */
.stp{display:flex;align-items:center;gap:10px;background:var(--s2);border:1.5px solid var(--bd);border-radius:12px;padding:4px;}
.stb{width:38px;height:38px;border-radius:10px;border:none;background:var(--sf);color:var(--tx);font-size:22px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.stv{flex:1;text-align:center;font-size:18px;font-weight:900;}
/* TOTAL */
.tb{background:rgba(61,142,240,0.08);border:1px solid rgba(61,142,240,0.2);border-radius:14px;padding:14px 16px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;}
.tv{font-size:22px;font-weight:900;color:var(--blue);}
/* EMPTY */
.empty{text-align:center;padding:48px 20px;color:var(--sub);}
.ei{font-size:44px;margin-bottom:10px;opacity:.4;}
/* PROGRESS */
.pb{height:6px;background:var(--s2);border-radius:3px;overflow:hidden;margin-top:8px;}
.pf{height:100%;border-radius:3px;background:linear-gradient(90deg,#3D8EF0,#2060C0);}
</style>

function renderStockList(){
  const types=['Все','Fiolet','Xuqlar','Xuqlar Sadə'];
  const list=stock.filter(i=>((_sf==='Все')||i.type===_sf)&&(i.name.toLowerCase().includes(_st.toLowerCase())||i.brand.toLowerCase().includes(_st.toLowerCase())));
  if(!list.length)return`<div class="empty"><div class="ei">📦</div><div>Ничего не найдено</div></div>`;
  return list.map(item=>{
    const st=item.qty===0?'blow':item.qty<=item.minQty?'bwarn':'bok';
    const cl=cu.role==='owner'?`onclick="openItemModal(${item.id})" style="cursor:pointer"`:'';
    return`<div class="ir" ${cl}><div class="ii" style="background:${item.qty<=item.minQty?'rgba(240,82,82,0.12)':'rgba(61,142,240,0.1)'}">${item.qty<=item.minQty?'⚠️':'🪟'}</div><div class="ib"><div class="in">${item.name}</div><div class="is">${item.sku} · ${item.type}</div></div><div class="iright"><span class="b ${st}">${item.qty} шт.</span>${cu.role==='owner'?`<div style="font-size:11px;color:var(--sub);margin-top:3px">${item.price?item.price.toLocaleString('ru')+' ₼':'—'}</div>`:''}</div></div>`;
  }).join('');
}

function renderClientsList(){
  const list=clients.filter(c=>c.name.toLowerCase().includes(_cs.toLowerCase())||(c.phone&&c.phone.toLowerCase().includes(_cs.toLowerCase())));
  if(!list.length)return`<div class="empty"><div class="ei">👥</div><div>${clients.length===0?'Нет клиентов':'Ничего не найдено'}</div></div>`;
  return list.map(c=>{
    const cSales=sales.filter(s=>s.clientId===c.id&&s.status!=='оплата');
    const total=cSales.reduce((a,s)=>a+s.total,0);
    const debt=c.debt||0;
    return`<div class="ir" onclick="openClientModal(${c.id})" style="cursor:pointer">
      <div class="ii" style="background:${debt>0?'rgba(240,82,82,0.15)':'rgba(61,142,240,0.1)'};font-size:20px">${debt>0?'⚠️':'👤'}</div>
      <div class="ib"><div class="in">${c.name}</div><div class="is">${c.phone||'—'} · ${c.car||'—'}</div></div>
      <div class="iright">${debt>0?`<div style="font-size:13px;font-weight:900;color:#F05252">${debt.toLocaleString('ru')} ₼ долг</div>`:`<div class="ip">${total?total.toLocaleString('ru')+' ₼':'—'}</div>`}
      <div style="font-size:11px;color:var(--sub)">${cSales.length} покупок</div></div>
    </div>`;
  }).join('');
}

// Load from Firebase and listen for realtime updates
function fbInit() {
  // Listen stock
  db.collection('stock').doc('main').onSnapshot(doc => {
    if(doc.exists) {
      const d = JSON.parse(doc.data().data);
      stock = d;
      localStorage.setItem('s', JSON.stringify(stock));
      if(ctab === 'stock' || ctab === 'home') showTab(ctab);
    }
  });
  // Listen sales
  db.collection('sales').doc('main').onSnapshot(doc => {
    if(doc.exists) {
      sales = JSON.parse(doc.data().data);
      localStorage.setItem('sa', JSON.stringify(sales));
      if(ctab === 'sales' || ctab === 'sell' || ctab === 'home' || ctab === 'history') showTab(ctab);
    }
  });
  // Listen requests
  db.collection('requests').doc('main').onSnapshot(doc => {
    if(doc.exists) {
      requests = JSON.parse(doc.data().data);
      localStorage.setItem('rq', JSON.stringify(requests));
      if(ctab === 'more' || ctab === 'reqs') showTab(ctab);
      buildNav();
    }
  });
  // Listen clients
  db.collection('clients').doc('main').onSnapshot(doc => {
    if(doc.exists) {
      clients = JSON.parse(doc.data().data);
      localStorage.setItem('cl', JSON.stringify(clients));
      if(ctab === 'clients') showTab(ctab);
    }
  });
}

function showTab(id){

  const c=document.getElementById('content');

  else if(id==='stock')c.innerHTML=rStock();
  else if(id==='sales'||id==='sell')c.innerHTML=rSales();
  else if(id==='reports')c.innerHTML=rReports();
  else if(id==='more')c.innerHTML=rMore();
  else if(id==='clients')c.innerHTML=rClients();
  else if(id==='history')c.innerHTML=rHistory();
  else if(id==='reqs')c.innerHTML=rReqs();
}

// HOME
function rHome(){
  const done=sales.filter(s=>s.status==='завершена');
  const rev=done.reduce((a,s)=>a+s.total,0);
  const cost=done.reduce((a,s)=>{const it=stock.find(i=>i.id===s.itemId);return a+(it?it.cost*s.qty:0);},0);
  const prf=rev-cost,mg=rev>0?((prf/rev)*100).toFixed(0):0;
  const low=stock.filter(i=>i.qty<=i.minQty);
  let h='';
  const totalDebt=clients.reduce((a,c)=>a+(c.debt||0),0);
  const debtors=clients.filter(c=>c.debt>0);
  if(low.length)h+=`<div class="al al-r" onclick="showTab('stock')">⚠️ ${low.length} позиций с низким остатком</div>`;
  if(pend())h+=`<div class="al al-y" onclick="showTab('more')">📋 ${pend()} заявок ожидают одобрения</div>`;
  if(totalDebt>0)h+=`<div class="al" style="background:rgba(240,82,82,0.12);border:1px solid rgba(240,82,82,0.3);color:#F05252" onclick="showTab('clients')">💸 Долги клиентов: ${totalDebt.toLocaleString('ru')} ₼ · ${debtors.length} чел.</div>`;
  h+=`<div class="sg">
    <div class="sc full" style="border-color:rgba(61,142,240,0.25)">
      <div class="sl">Выручка за период</div>
      <div class="sv" style="color:#3D8EF0">${rev.toLocaleString('ru')} ₼</div>
      <div class="sn">${done.length} продаж завершено</div>
      <div class="pb"><div class="pf" style="width:70%"></div></div>
    </div>
    <div class="sc" style="border-color:rgba(61,214,140,0.2)">
      <div class="sl">Прибыль</div>
      <div class="sv" style="color:#3DD68C;font-size:20px">${prf.toLocaleString('ru')} ₼</div>
      <div class="sn">Маржа ${mg}%</div>
    </div>
    <div class="sc">
      <div class="sl">На складе</div>
      <div class="sv">${stock.reduce((a,i)=>a+i.qty,0)}</div>
      <div class="sn">ед. товара</div>
    </div>
  </div>`;
  if(sales.length){
    h+=`<div class="sh">Последние продажи</div><div class="card" style="padding:4px 18px">`;
    sales.slice(0,5).forEach(s=>{h+=`<div class="ir"><div class="ii" style="background:rgba(61,214,140,0.1)">🪟</div><div class="ib"><div class="in">${s.itemName}</div><div class="is">${s.client} · ${s.employee}</div></div><div class="iright"><div class="ip">${s.total.toLocaleString('ru')} ₼</div><div style="font-size:11px;color:var(--sub)">${s.date}</div></div></div>`;});
    h+=`</div>`;
  }
  return h;
}

function procSale(){
  const cl=document.getElementById('scl')?.value?.trim();
  if(!_si||!cl)return alert('Выберите товар и укажите клиента');
  if(_si.qty<_sq)return alert('Недостаточно товара');
  const total=_si.price*_sq;
  const paid=_pt==='cash'?total:parseInt(document.getElementById('spaid')?.value||0);
  const debt=total-paid;
  let foundClient=clients.find(c=>c.name.toLowerCase()===cl.toLowerCase()||c.phone===cl);
  if(!foundClient){
    const nc={id:Date.now()+1,name:cl,phone:'',car:'',note:'',debt:0,createdAt:new Date().toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric'})};
    clients.push(nc);foundClient=nc;
  }
  if(!foundClient.debt)foundClient.debt=0;
  foundClient.debt+=debt;
  clients=clients.map(c=>c.id===foundClient.id?foundClient:c);
  sales.unshift({id:Date.now(),date:new Date().toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit'}),
    itemId:_si.id,itemName:_si.name,qty:_sq,price:_si.price,total,paid,debt,
    payType:_pt,employee:cu.name,client:cl,clientId:foundClient.id,status:'завершена'});
  stock=stock.map(i=>i.id===_si.id?{...i,qty:i.qty-_sq}:i);
  _si=null;_sq=1;_pt='cash';sv();
  toast(debt>0?'Продажа оформлена! Долг: '+debt.toLocaleString('ru')+' ₼':'Продажа успешно оформлена!');
  showTab(ctab);
}

function importExcel(input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=new Uint8Array(e.target.result);
      const wb=XLSX.read(data,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
      if(!rows.length)return alert('Файл пустой или неправильный формат');
      
      // Try to detect columns automatically
      const firstRow=rows[0];
      const keys=Object.keys(firstRow);
      
      // Find name column
      const nameKey=keys.find(k=>k.toLowerCase().includes('наз')||k.toLowerCase().includes('name')||k.toLowerCase().includes('товар')||k.toLowerCase().includes('стекл'))||keys[0];
      // Find qty column  
      const qtyKey=keys.find(k=>k.toLowerCase().includes('кол')||k.toLowerCase().includes('qty')||k.toLowerCase().includes('остат')||k.toLowerCase().includes('количеств'))||keys[2];
      // Find brand
      const brandKey=keys.find(k=>k.toLowerCase().includes('марк')||k.toLowerCase().includes('brand')||k.toLowerCase().includes('авто'));
      // Find price
      const priceKey=keys.find(k=>k.toLowerCase().includes('цен')||k.toLowerCase().includes('price')||k.toLowerCase().includes('продаж'));
      // Find cost
      const costKey=keys.find(k=>k.toLowerCase().includes('себ')||k.toLowerCase().includes('cost')||k.toLowerCase().includes('закуп'));
      // Find type/category
      const typeKey=keys.find(k=>k.toLowerCase().includes('тип')||k.toLowerCase().includes('катег')||k.toLowerCase().includes('type'));
      
      let added=0, skipped=0;
      const newItems=[];
      
      rows.forEach(row=>{
        const name=String(row[nameKey]||'').trim();
        if(!name||name.length<2){skipped++;return;}
        const qty=parseInt(row[qtyKey])||0;
        const brand=brandKey?String(row[brandKey]||'').trim():name.split(' ')[0];
        const price=priceKey?parseFloat(row[priceKey])||0:0;
        const cost=costKey?parseFloat(row[costKey])||0:0;
        const type=typeKey?String(row[typeKey]||'').trim():'Импорт';
        
        // Check if item already exists
        const exists=stock.find(i=>i.name.toLowerCase()===name.toLowerCase());
        if(exists){
          // Update quantity
          stock=stock.map(i=>i.name.toLowerCase()===name.toLowerCase()?{...i,qty:i.qty+qty}:i);
        }else{
          newItems.push({
            id:Date.now()+added,
            name,sku:'IMP-'+String(Date.now()+added).slice(-6),
            brand,type,qty,minQty:2,price,cost
          });
        }
        added++;
      });
      
      stock=[...stock,...newItems];
      sv();
      input.value='';
      showTab('stock');
      toast('Импорт завершён! Добавлено: '+newItems.length+' новых, обновлено: '+(added-newItems.length));
    }catch(err){
      alert('Ошибка чтения файла: '+err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

    h+=`<div class="card" style="padding:4px 18px">`;
    if(!requests.length)h+=`<div class="empty"><div class="ei">📋</div><div>Заявок нет</div></div>`;
    requests.forEach(r=>{h+=`<div style="padding:13px 0;border-bottom:1px solid var(--bd)"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px"><div style="flex:1;margin-right:8px"><div style="font-size:14px;font-weight:700">${r.itemName}</div><div style="font-size:12px;color:var(--sub);margin-top:2px;font-weight:600">${r.employee} · ${r.date} · ${r.qty} шт.</div>${r.note?`<div style="font-size:12px;color:#F0B429;margin-top:2px">💬 ${r.note}</div>`:''}</div><span class="b ${r.status==='одобрено'?'bok':r.status==='отклонено'?'blow':'bwarn'}">${r.status}</span></div>${r.status==='ожидает'?`<div style="display:flex;gap:8px"><button class="btn bs" style="flex:1;padding:9px" onclick="appR(${r.id})">✓ Одобрить</button><button class="btn bd2" style="flex:1;padding:9px" onclick="rejR(${r.id})">✕ Отказ</button></div>`:''}</div>`;});
    h+=`</div>`;
  }else{
    h+=`<div class="card" style="padding:4px 18px">`;
    employees.forEach(e=>{h+=`<div class="ir"><div class="ii" style="background:rgba(61,142,240,0.1);font-size:18px">👤</div><div class="ib"><div class="in">${e.name}</div><div class="is">${e.username}</div></div><div class="iright"><button class="btn bd2" style="padding:5px 10px;font-size:11px" onclick="delEmp(${e.id})">Удалить</button></div></div>`;});
    h+=`</div><button class="fab" onclick="oAddEmp()">＋</button>`;
  }
  return h;
}
function appR(id){const r=requests.find(x=>x.id===id);if(!r)return;stock=stock.map(i=>i.id===r.itemId?{...i,qty:i.qty+r.qty}:i);requests=requests.map(x=>x.id===id?{...x,status:'одобрено'}:x);sv();showTab('more');}
function rejR(id){requests=requests.map(x=>x.id===id?{...x,status:'отклонено'}:x);sv();showTab('more');}
function delEmp(id){employees=employees.filter(e=>e.id!==id);sv();showTab('more');}
function oAddEmp(){
  document.getElementById('ms').innerHTML=`<div class="mh"></div><div class="mt">Новый сотрудник</div>
    <div class="fg"><label class="lbl">Полное имя</label><input class="inp" id="en"/></div>
    <div class="fg"><label class="lbl">Логин</label><input class="inp" id="eu"/></div>
    <div class="fg"><label class="lbl">Пароль</label><input class="inp" id="epw" value="1234"/></div>
    <button class="btn bp bf" onclick="addEmp()">Добавить</button>`;
  openModal();
}
function addEmp(){
  const name=document.getElementById('en').value.trim(),username=document.getElementById('eu').value.trim(),password=document.getElementById('epw').value;
  if(!name||!username)return alert('Заполните имя и логин');
  employees.push({id:Date.now(),name,username,password});
  USERS.push({name,role:'employee',username,password});
  sv();closeModal();showTab('more');
}

// HISTORY
function rHistory(){
  const my=sales.filter(s=>s.employee===cu.name);
  const tot=my.reduce((a,s)=>a+s.total,0);
  let h=`<div class="sg"><div class="sc"><div class="sl">Мои продажи</div><div class="sv">${my.length}</div></div><div class="sc" style="border-color:rgba(61,214,140,0.2)"><div class="sl">Выручка</div><div class="sv" style="color:#3DD68C;font-size:20px">${tot.toLocaleString('ru')} ₼</div></div></div><div class="sh">История</div><div class="card" style="padding:4px 18px">`;
  if(!my.length)h+=`<div class="empty"><div class="ei">📋</div><div>Продаж пока нет</div></div>`;
  my.forEach(s=>{h+=`<div class="ir"><div class="ii" style="background:rgba(61,214,140,0.08)">🪟</div><div class="ib"><div class="in">${s.itemName}</div><div class="is">${s.client} · ${s.date}</div></div><div class="iright"><div class="ip">${s.total.toLocaleString('ru')} ₼</div></div></div>`;});
  return h+`</div>`;
}

// REQUESTS (employee)
function rReqs(){
  const my=requests.filter(r=>r.employee===cu.name);
  let h=`<div class="sh">Мои заявки</div><div class="card" style="padding:4px 18px">`;
  if(!my.length)h+=`<div class="empty"><div class="ei">📋</div><div>Заявок нет</div></div>`;
  my.forEach(r=>{h+=`<div style="padding:12px 0;border-bottom:1px solid var(--bd)"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div style="font-size:14px;font-weight:700">${r.itemName}</div><div style="font-size:12px;color:var(--sub);margin-top:2px;font-weight:600">${r.date} · ${r.qty} шт.</div>${r.note?`<div style="font-size:12px;color:#F0B429;margin-top:2px">💬 ${r.note}</div>`:''}</div><span class="b ${r.status==='одобрено'?'bok':r.status==='отклонено'?'blow':'bwarn'}">${r.status}</span></div></div>`;});
  h+=`</div><button class="fab" onclick="oAddReq()">＋</button>`;
  return h;
}
function oAddReq(){
  _rq=1;
  document.getElementById('ms').innerHTML=`<div class="mh"></div><div class="mt">Заявка на пополнение</div>
    <div class="fg"><label class="lbl">Товар</label><select class="fsel" id="ri"><option value="">— Выберите товар —</option>${stock.map(i=>`<option value="${i.id}">${i.name} (ост. ${i.qty})</option>`).join('')}</select></div>
    <div class="fg"><label class="lbl">Количество</label><div class="stp"><button class="stb" onclick="_rq=Math.max(1,_rq-1);document.getElementById('rqv').textContent=_rq">−</button><div class="stv" id="rqv">1</div><button class="stb" onclick="_rq++;document.getElementById('rqv').textContent=_rq">+</button></div></div>
    <div class="fg"><label class="lbl">Комментарий</label><input class="inp" id="rn" placeholder="Причина, срочность..."/></div>
    <button class="btn bp bf" onclick="subReq()">Отправить заявку</button>`;
  openModal();
}
function subReq(){
  const iid=parseInt(document.getElementById('ri').value);
  if(!iid)return alert('Выберите товар');
  const it=stock.find(i=>i.id===iid);
  requests.unshift({id:Date.now(),date:new Date().toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit'}),
    itemId:iid,itemName:it?.name||'',qty:_rq,employee:cu.name,status:'ожидает',note:document.getElementById('rn').value});
  sv();closeModal();showTab('reqs');toast('Заявка отправлена!');
}


// CLIENTS
function rClients(){
  const list=clients.filter(c=>c.name.toLowerCase().includes(_cs.toLowerCase())||c.phone.toLowerCase().includes(_cs.toLowerCase()));
  let h=`<div class="sw"><input class="si" id="csr" placeholder="🔍 Поиск клиента..." value="${_cs}" oninput="debouncedClients(this.value)"/></div>`;
  h+=`<div style="padding:0 16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center">`;
  h+=`<span style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#3A4060">${clients.length} клиентов</span></div>`;
  h+=`<div class="card" style="padding:4px 18px">`;
  if(!list.length)h+=`<div class="empty"><div class="ei">👥</div><div>${clients.length===0?'Нет клиентов. Добавьте первого!':'Ничего не найдено'}</div></div>`;
  list.forEach(c=>{
    const cSales=sales.filter(s=>s.clientId===c.id&&s.status!=='оплата');
    const total=cSales.reduce((a,s)=>a+s.total,0);
    const debt=c.debt||0;
    h+=`<div class="ir" onclick="openClientModal(${c.id})" style="cursor:pointer">
      <div class="ii" style="background:${debt>0?'rgba(240,82,82,0.15)':'rgba(61,142,240,0.1)'};font-size:20px">${debt>0?'⚠️':'👤'}</div>
      <div class="ib">
        <div class="in">${c.name}</div>
        <div class="is">${c.phone||'—'} · ${c.car||'—'}</div>
      </div>
      <div class="iright">
        ${debt>0?`<div style="font-size:13px;font-weight:900;color:#F05252">${debt.toLocaleString('ru')} ₼ долг</div>`:`<div class="ip">${total?total.toLocaleString('ru')+' ₼':'—'}</div>`}
        <div style="font-size:11px;color:var(--sub)">${cSales.length} покупок</div>
      </div>
    </div>`;
  });
  h+=`</div><button class="fab" onclick="oAddClient()">＋</button>`;
  return h;
}

function openClientModal(id){
  const c=clients.find(x=>x.id===id);if(!c)return;
  const cSales=sales.filter(s=>s.clientId===c.id);
  const total=cSales.reduce((a,s)=>a+s.total,0);
  const debt=c.debt||0;
  let h=`<div class="mh"></div><div class="mt">${c.name}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:${debt>0?'10px':'16px'}">
      <div class="card" style="padding:14px;margin:0"><div class="sl">Покупок</div><div style="font-size:22px;font-weight:900">${cSales.length}</div></div>
      <div class="card" style="padding:14px;margin:0"><div class="sl">Итого</div><div style="font-size:18px;font-weight:900;color:#3DD68C">${total?total.toLocaleString('ru')+' ₼':'0 ₼'}</div></div>
    </div>
    ${debt>0?`<div style="background:rgba(240,82,82,0.12);border:1px solid rgba(240,82,82,0.3);border-radius:14px;padding:14px 16px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center">
      <div><div style="font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:#F05252">ДОЛГ</div>
      <div style="font-size:26px;font-weight:900;color:#F05252">${debt.toLocaleString('ru')} ₼</div></div>
      <button class="btn bp" style="background:linear-gradient(135deg,#3DD68C,#2aa86a)" onclick="openPayDebt(${c.id},${debt})">Принять оплату</button>
    </div>`:''}
    <div class="fg"><label class="lbl">Имя</label><input class="inp" id="cin" value="${c.name}"/></div>
    <div class="fg"><label class="lbl">Телефон</label><input class="inp" id="cph" type="tel" value="${c.phone||''}"/></div>
    <div class="fg"><label class="lbl">Автомобиль</label><input class="inp" id="cca" value="${c.car||''}"/></div>
    <div class="fg"><label class="lbl">Заметка</label><input class="inp" id="cno" value="${c.note||''}"/></div>`;
  if(cSales.length){
    h+=`<div style="font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#3A4060;margin-bottom:10px">История покупок</div>`;
    cSales.slice(0,5).forEach(s=>{h+=`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--bd);font-size:13px"><span style="color:var(--tx)">${s.itemName}</span><span style="color:#3DD68C;font-weight:800">${s.total.toLocaleString('ru')} ₼</span></div>`;});
  }
  h+=`<div style="display:flex;gap:10px;margin-top:16px">
    <button class="btn bp" style="flex:2" onclick="saveClient(${id})">Сохранить</button>
    <button class="btn bd2" style="flex:1" onclick="delClient(${id})">🗑</button>
  </div>`;
  document.getElementById('ms').innerHTML=h;
  openModal();
}

function saveClient(id){
  clients=clients.map(c=>c.id===id?{...c,
    name:document.getElementById('cin').value.trim(),
    phone:document.getElementById('cph').value.trim(),
    car:document.getElementById('cca').value.trim(),
    note:document.getElementById('cno').value.trim()
  }:c);
  sv();closeModal();showTab('clients');
}
function delClient(id){if(!confirm('Удалить клиента?'))return;clients=clients.filter(c=>c.id!==id);sv();closeModal();showTab('clients');}

function oAddClient(){
  document.getElementById('ms').innerHTML=`<div class="mh"></div><div class="mt">Новый клиент</div>
    <div class="fg"><label class="lbl">Имя</label><input class="inp" id="cn"/></div>
    <div class="fg"><label class="lbl">Телефон</label><input class="inp" id="cp" type="tel" placeholder="+994 50 000 00 00"/></div>
    <div class="fg"><label class="lbl">Автомобиль</label><input class="inp" id="cc" placeholder="Toyota Camry 2018"/></div>
    <div class="fg"><label class="lbl">Заметка</label><input class="inp" id="cnn" placeholder="Необязательно"/></div>
    <button class="btn bp bf" onclick="addClient()">Добавить клиента</button>`;
  openModal();
}
function addClient(){
  const name=document.getElementById('cn').value.trim();
  if(!name)return alert('Введите имя');
  clients.push({id:Date.now(),name,phone:document.getElementById('cp').value.trim(),car:document.getElementById('cc').value.trim(),note:document.getElementById('cnn').value.trim(),createdAt:new Date().toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric'})});
  sv();closeModal();showTab('clients');toast('Клиент добавлен!');
}

function openPayDebt(clientId, currentDebt){
  document.getElementById('ms').innerHTML=`<div class="mh"></div>
    <div class="mt">Принять оплату долга</div>
    <div style="background:rgba(240,82,82,0.12);border:1px solid rgba(240,82,82,0.25);border-radius:14px;padding:14px;margin-bottom:16px;text-align:center">
      <div style="font-size:11px;color:#F05252;font-weight:800;letter-spacing:1px;text-transform:uppercase">Текущий долг</div>
      <div style="font-size:32px;font-weight:900;color:#F05252">${currentDebt.toLocaleString('ru')} ₼</div>
    </div>
    <div class="fg"><label class="lbl">Сумма оплаты (₼)</label>
      <input class="inp" id="pay-amt" type="number" placeholder="0" value="${currentDebt}"/>
    </div>
    <div class="fg"><label class="lbl">Заметка</label>
      <input class="inp" id="pay-note" placeholder="Необязательно"/>
    </div>
    <button class="btn bp bf" style="background:linear-gradient(135deg,#3DD68C,#2aa86a)" onclick="applyPayment(${clientId},${currentDebt})">✓ Принять оплату</button>`;
  openModal();
}

function applyPayment(clientId, currentDebt){
  const amt=Math.min(parseInt(document.getElementById('pay-amt').value)||0, currentDebt);
  if(amt<=0)return alert('Введите сумму');
  const note=document.getElementById('pay-note').value;
  clients=clients.map(c=>c.id===clientId?{...c,debt:Math.max(0,(c.debt||0)-amt)}:c);
  // Add payment record to sales as a payment entry
  sales.unshift({id:Date.now(),date:new Date().toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit'}),
    itemId:0,itemName:'Погашение долга'+(note?' ('+note+')':''),qty:1,price:amt,total:amt,paid:amt,debt:0,
    payType:'payment',employee:cu.name,client:clients.find(c=>c.id===clientId)?.name||'',clientId,status:'оплата'});
  sv();closeModal();
  toast('Оплата '+amt.toLocaleString('ru')+' ₼ принята!');
  showTab('clients');
}

function openModal(){document.getElementById('ov').classList.add('open');}
function closeModal(e){if(!e||e.target===document.getElementById('ov'))document.getElementById('ov').classList.remove('open');}
function toast(msg){const a=document.createElement('div');a.className='al al-g';a.style.cssText='position:fixed;top:20px;left:16px;right:16px;z-index:300;font-size:14px';a.textContent='✅ '+msg;document.body.appendChild(a);setTimeout(()=>a.remove(),2500);}
</script>
</body>
</html>
